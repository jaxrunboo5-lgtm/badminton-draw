<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>羽毛球队伍抽签</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <div id="app" class="max-w-4xl mx-auto p-4"></div>

  <script>
    // 状态管理
    let state = JSON.parse(localStorage.getItem('bd_data')) || {
      event: "2026年4月羽毛球赛",
      tiers: {
        A: ["张三", "李四", "王五", "赵六", "钱七", "孙八", "周九", "吴十"],
        B: ["甲一", "甲二", "甲三", "甲四", "甲五", "甲六", "甲七", "甲八"],
        C: ["乙一", "乙二", "乙三", "乙四", "乙五", "乙六", "乙七", "乙八"],
        D: ["丙一", "丙二", "丙三", "丙四", "丙五", "丙六", "丙七", "丙八"],
        E: ["丁一", "丁二", "丁三", "丁四", "丁五", "丁六", "丁七", "丁八"]
      },
      fixedTeams: [] // [{id: 1, members: {A: '张三', B: '甲一'...}}]
    };
    let currentView = 'home'; // home, login, admin

    function save() { localStorage.setItem('bd_data', JSON.stringify(state)); }

    // 渲染函数
    function render() {
      const app = document.getElementById('app');
      if(currentView === 'home') renderHome(app);
      else if(currentView === 'login') renderLogin(app);
      else if(currentView === 'admin') renderAdmin(app);
    }

    function renderHome(app) {
      app.innerHTML = `
        <div class="flex justify-between items-center mb-8">
          <h1 class="text-2xl font-bold">${state.event}</h1>
          <button onclick="currentView='login';render()" class="text-sm text-gray-500 hover:text-indigo-600">管理员登录</button>
        </div>
        <button onclick="startDraw()" class="w-full py-4 bg-indigo-600 text-white rounded-xl text-lg font-bold">🎲 开始抽签</button>
      `;
    }

    function renderLogin(app) {
      app.innerHTML = `
        <div class="bg-white p-8 rounded-2xl shadow-lg max-w-sm mx-auto">
          <h2 class="text-xl font-bold mb-4">管理员登录</h2>
          <input id="user" placeholder="用户名" class="w-full border p-2 mb-2 rounded">
          <input id="pass" type="password" placeholder="密码" class="w-full border p-2 mb-4 rounded">
          <div class="flex gap-2">
            <button onclick="currentView='home';render()" class="flex-1 bg-gray-200 py-2 rounded">取消</button>
            <button onclick="login()" class="flex-1 bg-indigo-600 text-white py-2 rounded">登录</button>
          </div>
        </div>
      `;
    }

    function login() {
      if(document.getElementById('user').value === 'admin' && document.getElementById('pass').value === 'admin123') {
        currentView = 'admin'; render();
      } else alert('密码错误');
    }

    function renderAdmin(app) {
      app.innerHTML = `
        <div class="bg-white p-6 rounded-2xl shadow-lg">
          <div class="flex justify-between mb-6">
            <h2 class="text-xl font-bold">后台管理</h2>
            <button onclick="currentView='home';render()" class="text-red-500">退出</button>
          </div>
          <div class="space-y-6">
            <div>
              <h3 class="font-bold mb-2">人员配置 (梯队)</h3>
              ${Object.keys(state.tiers).map(t => `
                <div class="mb-2">
                  <label class="font-bold">${t}:</label>
                  <input value="${state.tiers[t].join(',')}" onchange="updateTiers('${t}', this.value)" class="w-full border p-2 rounded text-sm">
                </div>
              `).join('')}
            </div>
            <div>
              <h3 class="font-bold mb-2">固定队伍 (选择人员)</h3>
              <div id="fixed-teams" class="space-y-2"></div>
              <button onclick="addFixedTeam()" class="mt-2 text-indigo-600">+ 添加固定队伍</button>
            </div>
          </div>
        </div>
      `;
      renderFixedTeams();
    }

    function updateTiers(t, val) { state.tiers[t] = val.split(','); save(); }
    
    function addFixedTeam() {
      state.fixedTeams.push({id: Date.now(), members: {}});
      renderFixedTeams(); save();
    }

    function renderFixedTeams() {
      const container = document.getElementById('fixed-teams');
      container.innerHTML = state.fixedTeams.map((team, idx) => `
        <div class="p-3 bg-gray-50 rounded border">
          <div class="flex justify-between mb-2"><span>队伍 ${idx+1}</span><button onclick="state.fixedTeams.splice(${idx},1);renderFixedTeams();save()" class="text-red-500">删除</button></div>
          ${Object.keys(state.tiers).map(t => `
            <select class="w-full mb-1 text-sm border p-1" onchange="state.fixedTeams[${idx}].members['${t}']=this.value;save()">
              <option value="">${t} - 选择人员</option>
              ${state.tiers[t].map(n => `<option value="${n}" ${team.members[t]===n?'selected':''}>${n}</option>`).join('')}
            </select>
          `).join('')}
        </div>
      `).join('');
    }

    function startDraw() {
      alert("抽签逻辑执行中..."); // 这里整合之前逻辑
      console.log('抽签数据:', state);
    }

    render();
  </script>
</body>
</html>
